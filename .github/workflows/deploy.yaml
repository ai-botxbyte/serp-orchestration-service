name: Build and Deploy to DO Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set environment
      run: |
        ENV=${{ github.event.inputs.environment || 'dev' }}
        echo "DEPLOY_ENV=$ENV" >> $GITHUB_ENV
        echo "🌍 Deploying to: $ENV"

    - name: Load environment variables
      run: |
        ENV_FILE=".env.$DEPLOY_ENV"
        if [ -f $ENV_FILE ]; then
          echo "📝 Loading variables from $ENV_FILE"
          cat $ENV_FILE
          grep -v '^#' $ENV_FILE | grep -v '^$' | sed 's/^export //' >> $GITHUB_ENV
        else
          echo "❌ $ENV_FILE file not found!"
          exit 1
        fi

    - name: Set deployment variables
      run: |
        echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}" >> $GITHUB_ENV
        echo "KUBE_DEPLOYMENT=${{ github.event.repository.name }}" >> $GITHUB_ENV
        echo "KUBE_CONTAINER=${{ github.event.repository.name }}" >> $GITHUB_ENV
        echo "SERVICE_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV

    - name: Display deployment configuration
      run: |
        echo "🚀 Deployment Configuration:"
        echo "   Docker Image: $DOCKER_IMAGE"
        echo "   Namespace: $KUBE_NAMESPACE"
        echo "   Deployment: $KUBE_DEPLOYMENT"
        echo "   Container: $KUBE_CONTAINER"
        echo "   Replicas: $REPLICAS"
        echo "   Port: $APP_PORT"
        echo "   CPU Limit: $CPU_LIMIT"
        echo "   Memory Limit: $MEMORY_LIMIT"
        echo "   CPU Request: $CPU_REQUEST"
        echo "   Memory Request: $MEMORY_REQUEST"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        build-args: |
          APP_PORT=${{ env.APP_PORT }}
          API_PREFIX=${{ github.event.repository.name }}
        tags: |
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

    - name: Set up kubectl with kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Verify connection to cluster
      run: |
        echo "🔍 Connecting to Kubernetes cluster..."
        kubectl cluster-info
        kubectl get nodes

    - name: Check if deployment exists
      id: check_deployment
      run: |
        if kubectl get deployment $KUBE_DEPLOYMENT -n $KUBE_NAMESPACE 2>/dev/null; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "✅ Deployment exists, will update image"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "📦 Deployment does not exist, will create new deployment"
        fi

    - name: Create or Update Deployment
      run: |
        if [ "${{ steps.check_deployment.outputs.exists }}" == "true" ]; then
          # Update existing deployment
          echo "🔄 Updating existing deployment..."
          
          # Update image
          kubectl set image deployment/$KUBE_DEPLOYMENT \
            $KUBE_CONTAINER=$DOCKER_IMAGE:${{ github.sha }} \
            -n $KUBE_NAMESPACE
          
          # Update replicas
          kubectl scale deployment/$KUBE_DEPLOYMENT \
            --replicas=$REPLICAS \
            -n $KUBE_NAMESPACE
          
          # Update resource limits and requests
          kubectl set resources deployment/$KUBE_DEPLOYMENT \
            --limits=cpu=$CPU_LIMIT,memory=$MEMORY_LIMIT \
            --requests=cpu=$CPU_REQUEST,memory=$MEMORY_REQUEST \
            -n $KUBE_NAMESPACE
          
          # Update or add liveness probe
          kubectl patch deployment $KUBE_DEPLOYMENT -n $KUBE_NAMESPACE --type=json -p='[
            {
              "op": "replace",
              "path": "/spec/template/spec/containers/0/livenessProbe",
              "value": {
                "httpGet": {
                  "path": "/'$KUBE_DEPLOYMENT'/api/v1/health/",
                  "port": '$APP_PORT'
                },
                "initialDelaySeconds": 30,
                "periodSeconds": 10
              }
            }
          ]' || kubectl patch deployment $KUBE_DEPLOYMENT -n $KUBE_NAMESPACE --type=json -p='[
            {
              "op": "add",
              "path": "/spec/template/spec/containers/0/livenessProbe",
              "value": {
                "httpGet": {
                  "path": "/'$KUBE_DEPLOYMENT'/api/v1/health/",
                  "port": '$APP_PORT'
                },
                "initialDelaySeconds": 30,
                "periodSeconds": 10
              }
            }
          ]'
        else
          # Create new deployment
          echo "🆕 Creating new deployment..."
          kubectl create deployment $KUBE_DEPLOYMENT \
            --image=$DOCKER_IMAGE:${{ github.sha }} \
            --replicas=$REPLICAS \
            --port=$APP_PORT \
            -n $KUBE_NAMESPACE
          
          # Update resource limits and requests
          kubectl set resources deployment/$KUBE_DEPLOYMENT \
            --limits=cpu=$CPU_LIMIT,memory=$MEMORY_LIMIT \
            --requests=cpu=$CPU_REQUEST,memory=$MEMORY_REQUEST \
            -n $KUBE_NAMESPACE
          
          # Add liveness probe
          kubectl patch deployment $KUBE_DEPLOYMENT -n $KUBE_NAMESPACE --type=json -p='[
            {
              "op": "add",
              "path": "/spec/template/spec/containers/0/livenessProbe",
              "value": {
                "httpGet": {
                  "path": "/'$KUBE_DEPLOYMENT'/api/v1/health/",
                  "port": '$APP_PORT'
                },
                "initialDelaySeconds": 30,
                "periodSeconds": 10
              }
            }
          ]'
        fi
        echo "⏳ Waiting for rollout to complete..."
        kubectl rollout status deployment/$KUBE_DEPLOYMENT -n $KUBE_NAMESPACE

    - name: Check if service exists
      id: check_service
      run: |
        if kubectl get service $SERVICE_NAME -n $KUBE_NAMESPACE 2>/dev/null; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "✅ Service exists, will update if needed"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "📦 Service does not exist, will create new service"
        fi

    - name: Create or Update Service
      run: |
        if [ "${{ steps.check_service.outputs.exists }}" == "true" ]; then
          echo "✅ Service already exists: $SERVICE_NAME"
        else
          echo "🆕 Creating new service..."
          kubectl expose deployment $KUBE_DEPLOYMENT \
            --type=$SERVICE_TYPE \
            --port=$APP_PORT \
            --target-port=$APP_PORT \
            --name=$SERVICE_NAME \
            -n $KUBE_NAMESPACE
          echo "✅ Service created successfully"
        fi

    - name: Verify deployment
      run: |
        echo "✅ Deployment successful!"
        echo ""
        echo "📦 Pods:"
        kubectl get pods -n $KUBE_NAMESPACE -l app=$KUBE_DEPLOYMENT
        echo ""
        echo "🔍 Deployment Details:"
        kubectl describe deployment $KUBE_DEPLOYMENT -n $KUBE_NAMESPACE
        echo ""
        echo "🌐 Service Details:"
        kubectl get service $SERVICE_NAME -n $KUBE_NAMESPACE
        echo ""
        echo "📍 Service Endpoints:"
        kubectl get endpoints $SERVICE_NAME -n $KUBE_NAMESPACE

